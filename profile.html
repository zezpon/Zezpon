<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <meta name="description" content="Manage your Zezpon profile, account details, and password settings." />
  <title>Profile | Zezpon</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header"><div class="container nav-wrap"><a href="Zezpon.html" class="brand"><div class="brand-mark">Z</div><div class="brand-copy"><strong>Zezpon</strong><span>Australian Market Academy</span></div></a><button class="menu-toggle" type="button" aria-expanded="false" aria-controls="siteNav">Menu</button><nav id="siteNav" class="site-nav"><a href="Zezpon.html">Home</a><a href="modules.html">Modules</a><a href="news.html">News</a><a href="results.html">Results</a><a href="videos.html">Videos</a><a href="membership.html">Membership</a><a href="guides.html">Guides</a><a href="contact.html">Contact</a></nav><div class="nav-actions"><a class="btn btn-secondary" href="dashboard.html">Dashboard</a></div></div></header>
  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Member Area</p>
        <h1>Profile Settings</h1>
        <p>Manage your account details, update your password, and keep your member information current.</p>
      </div>
    </section>
    <section class="section">
      <div class="container detail-layout">
        <div class="detail-copy">
          <section>
            <p class="panel-label">Account Details</p>
            <form id="profileForm">
              <div class="field-block">
                <label for="profileName">Full Name</label>
                <input id="profileName" name="name" type="text" required />
              </div>
              <div class="field-block">
                <label for="profileEmail">Email Address</label>
                <input id="profileEmail" name="email" type="email" required />
              </div>
              <div class="field-block">
                <label for="profileCurrentPassword">Current Password</label>
                <input id="profileCurrentPassword" name="currentPassword" type="password" minlength="6" />
              </div>
              <div class="field-block">
                <label for="profileNewPassword">New Password</label>
                <input id="profileNewPassword" name="newPassword" type="password" minlength="6" />
              </div>
              <button class="btn btn-primary" type="submit">Save Settings</button>
              <div id="profileFormMessage" class="auth-message"></div>
            </form>
          </section>
        </div>
        <aside class="detail-sidebar">
          <p class="panel-label">Account Snapshot</p>
          <div id="profileSummary">
            <p>Loading your account details...</p>
          </div>
        </aside>
      </div>
    </section>
  </main>
  <script src="site.js"></script>
  <script src="auth.js"></script>
  <script src="profile.js"></script>
</body>
</html>
